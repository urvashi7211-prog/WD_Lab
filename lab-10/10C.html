<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            height: 95vh;
        }
        .c1 , .c7{
            height: 7%;
            background-color: black;
        }
        .c2{
            background-color: red;
            height: 5vh;
            margin-top:1vh ;
            margin-bottom: 1vh;
            margin-left: 5vh;
            margin-right: 5vh;
            display: grid;
            place-items: center;
            font-size: x-large;
            border: 1px solid black;
        }
        .content{
            height: 62%;
            margin: 0 100px;
            position: relative;
            background: white;
            overflow: hidden;
            
        }
        .c3{
            background-color:blueviolet;
            width: 18%;
            height: 100%;
            float: left;
            margin-right: 15px; /* Space before yellow */
            display: grid;
            place-items: center;
            font-size: x-large;
            color: white;
             border: 1px solid black;
        }
        .c4{
            background-color: yellow;
             height: 100%;
    margin-right: 0; 
    display: grid;
    place-items: center;
    font-size: x-large;
    width: 58%;
     border: 1px solid black;

        }
        .c5{
            background-color: green;
           width: 22%;
    height: 73%;
    position: absolute;
    right: 0;
    top: 0;
    display: grid;
    place-items: center;
    font-size: x-large;
    color: white;
     border: 1px solid black;
}
.box{
    background-color: yellow;
    width: 25%;    
    height: 25%;
    position: absolute;
    right: 0;
    bottom: 0;   
     
}
        
        .c6{
            background-color: aquamarine;
           height: 5vh;
            margin-top:1vh ;
            margin-bottom: 1vh;
            margin-left: 5vh;
            margin-right: 5vh;
            display: grid;
            place-items: center;
            font-size: x-large;
             border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="c1"></div>
        <div class="c2">Header</div>
        <div class="content">
            <div class="c3">Navigation</div>
            <div class="c4">Content</div>
            <div class="c5">Sidebar</div>
            <div class="box"></div>
        </div>
        
        <div class="c6">Footer</div>
        <div class="c7"></div>
    </div>
</body>
</html>
