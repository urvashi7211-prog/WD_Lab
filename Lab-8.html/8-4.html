<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h1>Form</h1>
        <table>
            <tr>
                <td><label>Email:</label></td>
                <td><input type="email" pattern="[A-Za-z0-9]+@[a-z]+/.[a-z]{3,30}" required></td>
            </tr>
            <tr>
                <td><label>Mobile No:</label></td>
                <td><input type="tel" minlength="6" maxlength="10" required></td>
            </tr>
            <tr>
                <td><label>Birth Date:</label></td>
                <td><input type="date" required></td>
            </tr>
            <tr>
                <td><label>Age:</label></td>
                <td><input type="number" min="18" max="60" required></td>
            </tr>
            <tr>
                <td><label>Address:</label></td>
                <td><textarea name="" id="" rows="5" cols="20" required></textarea></td>
            </tr>
            <tr>
                <td><label>Password:</label></td>
                <td><input type="password" pattern="[A-Za-z0-9]" required></td>
            </tr>
            <tr align="Center">
                <td colspan="2"><button type="submit" value="submit">sumbit</button>
                <button type="cancel" value="cancel">cancel</button></td>
        </tr>
        </table>
    </form>
</body>
</html>
