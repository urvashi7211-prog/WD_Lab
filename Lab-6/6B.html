<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 align="Center">Employee Registration</h1>
    <form>
        <table>
           
            <tr>
                <th colspan="2" align="Center">Personal Information</th>
            </tr>
            <tr>
                <td><label>Employee Id</label></td>
                <td><input type="text"></td>
                <td><label>Employee name</label></td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td><label>Email</label></td>
                <td><input type="email"></td>
                <td><label>Contact No</label></td>
                <td><input type="tel"><br><br></td>
            </tr>
            <tr>
                 <td><label>Marital Status</label></td>
            <td><input type="radio" name="Marital Status">Single</td>
             <td><input type="radio" name="Marital Status">Married<br><br></td>
            </tr>
            <tr>
                <td colspan="2"align="center"><h4>Education Qualification</h4></td>
            </tr>
            
          
            <tr>
                <td><label>Education</label></td>
                <td><input type="text"></td>
                <td><label>Experience</label></td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td colspan="2"align="center"><h4>Job Details</h4></td>
            </tr>
            <tr>
                <td><label>Designation</label></td>
                <td><input type="text"></td>
                <td><label>Job location</label></td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td><label>Salary</label></td>
                <td><input type="number"></td>
            </tr>
        </table>
        <hr>
        <tr>
            <td><input type="submit"></td>
        </tr>
    </form>

</body>
</html>
